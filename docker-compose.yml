services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-platform-postgres
    environment:
      POSTGRES_DB: ecommerce_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ecommerce-platform-backend
    depends_on:
      - postgres
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce_platform
      JWT_SECRET: dev-docker-jwt-secret-change-me
      SEED_ON_START: "1"
      SEED_LIMIT: "250"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: ecommerce-platform-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
